<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up — Groove</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="shortcut icon" href="assents/images/SCR-20260314-rkby.png" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css"/>
  <link rel="stylesheet" href="css/header.css"/>
  <link rel="stylesheet" href="css/footer.css"/>
  <link rel="stylesheet" href="css/register.css"/>
</head>
<body class="page-static">

  <div class="bg-atmosphere">
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="grain"></div>
  </div>

  <div id="header-mount"></div>

  <main class="auth-container">
    <div class="auth-card">
      <div class="auth-vinyl">
        <svg width="56" height="56" viewBox="0 0 28 28" fill="none">
          <circle cx="14" cy="14" r="13" stroke="var(--accent)" stroke-width="1.2"/>
          <circle cx="14" cy="14" r="6" stroke="var(--accent)" stroke-width="1.2"/>
          <circle cx="14" cy="14" r="2" fill="var(--accent)"/>
          <line x1="14" y1="1" x2="14" y2="8" stroke="var(--accent)" stroke-width="1.2"/>
        </svg>
      </div>
      <h1 class="auth-title">Create your account</h1>
      <p class="auth-sub">Save your library and sync across devices.</p>

      <form class="auth-form" id="registerForm">
        <div class="auth-field">
          <label for="regName">Display name</label>
          <input type="text" id="regName" placeholder="Your name" autocomplete="name"/>
        </div>
        <div class="auth-field">
          <label for="regEmail">Email</label>
          <input type="email" id="regEmail" placeholder="you@example.com" autocomplete="email"/>
        </div>
        <div class="auth-field">
          <label for="regPassword">Password</label>
          <input type="password" id="regPassword" placeholder="At least 8 characters" autocomplete="new-password"/>
        </div>
        <div class="auth-field">
          <label for="regConfirm">Confirm password</label>
          <input type="password" id="regConfirm" placeholder="Repeat password" autocomplete="new-password"/>
        </div>
        <div class="auth-error" id="authError"></div>
        <button type="submit" class="auth-submit">Create account</button>
      </form>

      <p class="auth-footer-text">Already have an account? <a href="#">Sign in</a></p>
    </div>
  </main>

  <div id="footer-mount"></div>

  <script src="js/header.js"></script>
  <script src="js/footer.js"></script>
  <script src="js/register.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Groove — Vinyl Player</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css"/>
  <link rel="stylesheet" href="css/header.css"/>
  <link rel="stylesheet" href="css/footer.css"/>
  <link rel="stylesheet" href="css/player.css"/>
</head>
<body class="page-player">

  <div class="bg-atmosphere">
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="grain"></div>
  </div>

  <div id="header-mount"></div>

  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <circle cx="14" cy="14" r="13" stroke="var(--accent)" stroke-width="1.5"/>
            <circle cx="14" cy="14" r="6" stroke="var(--accent)" stroke-width="1.5"/>
            <circle cx="14" cy="14" r="2" fill="var(--accent)"/>
            <line x1="14" y1="1" x2="14" y2="7" stroke="var(--accent)" stroke-width="1.5"/>
          </svg>
          <span class="logo-text">Groove</span>
        </div>
        <div class="sidebar-tabs">
          <button class="sidebar-tab active" id="libTab">Библиотека</button>
          <button class="sidebar-tab" id="jamendoTab">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            Каталог
          </button>
        </div>
      </div>

      <div id="libraryPanel" class="sidebar-panel">
        <div class="search-wrap">
          <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" id="searchInput" placeholder="Поиск в библиотеке…" autocomplete="off"/>
        </div>
        <div class="library-label">
          Моя библиотека
          <button class="add-btn" id="addBtn" title="Добавить запись">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
        </div>
        <div class="record-list" id="recordList"></div>
      </div>

      <div id="jamendoPanel" class="sidebar-panel" style="display:none">
        <div class="sidebar-header" style="border-bottom:none; padding-bottom:8px">
          <div class="search-wrap">
            <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input type="text" id="jamendoSearch" placeholder="Поиск треков…" autocomplete="off"/>
          </div>
        </div>
        <div class="sp-results" id="jamendoResults"></div>
      </div>
    </aside>

    <main class="stage">
      <div class="turntable-wrap">
        <div class="turntable" id="turntable">
          <div class="platter-base">
            <div class="platter-ring r1"></div>
            <div class="platter-ring r2"></div>
            <div class="platter-ring r3"></div>
            <div class="platter-shadow"></div>
          </div>
          <div class="vinyl-on-platter" id="vinylOnPlatter">
            <div class="vinyl-disc" id="vinylDisc">
              <div class="vinyl-grooves"></div>
              <div class="vinyl-label" id="vinylLabel">
                <div class="label-art" id="labelArt"></div>
                <div class="label-hole"></div>
                <div class="label-upload-hint">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                  <span>Photo</span>
                </div>
              </div>
              <input type="file" id="vinylLabelInput" accept="image/*"/>
              <div class="vinyl-shine"></div>
            </div>
          </div>
          <div class="tonearm-wrap" id="tonearmWrap">
            <div class="tonearm-pivot"></div>
            <div class="tonearm-body">
              <div class="tonearm-headshell"></div>
            </div>
          </div>
          <div class="needle-wrap" id="needleWrap">
            <div class="needle-shaft"></div>
            <div class="needle-tip" id="needleTip"></div>
          </div>
          <div class="spindle"></div>
          <div class="deck-controls">
            <div class="deck-knob"></div>
            <div class="deck-button"></div>
            <div class="deck-knob"></div>
          </div>
        </div>
        <div class="now-playing">
          <div class="np-track" id="npTrack">Select a record to play</div>
          <div class="np-artist" id="npArtist">—</div>
          <div class="eq-bars" id="eqBars"></div>
        </div>
      </div>

      <div class="player-controls">
        <div class="progress-wrap">
          <span id="timeCur">0:00</span>
          <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
            <div class="progress-thumb" id="progressThumb"></div>
          </div>
          <span id="timeTot">0:00</span>
        </div>
        <div class="ctrl-row">
          <button class="ctrl-btn" id="crackleBtn" title="Vinyl Crackle">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 18v-6a9 9 0 0 1 18 0v6"/><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/></svg>
          </button>
          <button class="ctrl-btn" id="prevBtn">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
          </button>
          <button class="ctrl-btn ctrl-play" id="playBtn">
            <svg class="icon-play" width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            <svg class="icon-pause" width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
          </button>
          <button class="ctrl-btn" id="nextBtn">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
          </button>
          <button class="ctrl-btn" id="needleBtn" title="Drop / Lift Needle">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="2" x2="12" y2="15"/><circle cx="12" cy="19" r="3"/><polyline points="8,7 12,2 16,7" stroke-linejoin="round" fill="none"/></svg>
          </button>
          <div class="volume-wrap">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.8"/>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div id="footer-mount"></div>

  <div class="flying-vinyl" id="flyingVinyl"></div>
  <audio id="audioPlayer"></audio>
  <audio id="crackleAudio" loop></audio>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="addModal">
      <div class="modal-header">
        <span class="modal-title">Add a record</span>
        <button class="modal-close" id="modalClose">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-cover-pick" id="modalCoverPick">
        <div class="modal-cover-preview" id="modalCoverPreview">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          <span>Cover photo</span>
        </div>
        <input type="file" id="modalCoverInput" accept="image/*"/>
      </div>
      <div class="modal-fields">
        <div class="modal-field">
          <label for="modalTitle">Title</label>
          <input type="text" id="modalTitle" placeholder="Track name" autocomplete="off"/>
        </div>
        <div class="modal-field">
          <label for="modalArtist">Artist</label>
          <input type="text" id="modalArtist" placeholder="Artist name" autocomplete="off"/>
        </div>
        <div class="modal-field">
          <label>Audio file</label>
          <div class="modal-file-btn" id="modalAudioBtn">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
            <span id="modalAudioLabel">Choose audio…</span>
          </div>
          <input type="file" id="modalAudioInput" accept="audio/*"/>
        </div>
      </div>
      <div class="modal-footer">
        <button class="modal-cancel" id="modalCancel">Cancel</button>
        <button class="modal-submit" id="modalSubmit">Add to library</button>
      </div>
    </div>
  </div>

  <script src="js/header.js"></script>
  <script src="js/footer.js"></script>
  <script type="module" src="js/firebase.js"></script>
  <script src="js/script.js"></script>
  <script src="js/jamendo.js"></script>
</body>
</html>
